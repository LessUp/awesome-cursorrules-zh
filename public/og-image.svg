  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1040" cy="120" r="180" fill="rgba(95, 103, 238, 0.16)" />
  <circle cx="170" cy="560" r="220" fill="rgba(0, 212, 170, 0.14)" />

  <rect x="88" y="78" width="1024" height="474" rx="28" fill="rgba(9, 14, 30, 0.72)" stroke="rgba(255, 255, 255, 0.12)" />

