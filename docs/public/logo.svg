<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    :root {
      --logo-surface-a: oklch(0.62 0.18 268);
      --logo-surface-b: oklch(0.72 0.12 198);
      --logo-ink: oklch(0.98 0.004 255);
      --logo-mark: oklch(0.78 0.12 80);
    }
  </style>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--logo-surface-a)" />
      <stop offset="100%" stop-color="var(--logo-surface-b)" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad1)"/>
  <text x="50" y="50" font-family="ui-sans-serif, system-ui, sans-serif" font-size="45" font-weight="700" fill="var(--logo-ink)" text-anchor="middle" dominant-baseline="middle">CR</text>
  <circle cx="85" cy="15" r="8" fill="var(--logo-mark)"/>
</svg>
