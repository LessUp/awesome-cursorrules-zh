<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Awesome Cursor Rules social card</title>
  <desc id="desc">Awesome Cursor Rules Academy. Chinese-first technical whitepaper, architecture showcase, and research library.</desc>
  <style>
    :root {
      --card-bg-a: oklch(0.2 0.024 262);
      --card-bg-b: oklch(0.3 0.03 255);
      --card-panel: oklch(0.22 0.016 258 / 0.82);
      --card-panel-border: oklch(0.9 0.006 255 / 0.12);
      --card-brand-a: oklch(0.64 0.16 268);
      --card-brand-b: oklch(0.76 0.11 198);
      --card-ink: oklch(0.96 0.008 255);
      --card-muted: oklch(0.82 0.03 252);
      --card-subtle: oklch(0.72 0.02 250);
      --card-cite: oklch(0.8 0.12 80 / 0.14);
      --card-struct: oklch(0.72 0.1 268 / 0.16);
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--card-bg-a)" />
      <stop offset="100%" stop-color="var(--card-bg-b)" />
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--card-brand-a)" />
      <stop offset="100%" stop-color="var(--card-brand-b)" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1040" cy="120" r="180" fill="var(--card-struct)" />
  <circle cx="170" cy="560" r="220" fill="var(--card-cite)" />

  <rect x="88" y="78" width="1024" height="474" rx="28" fill="var(--card-panel)" stroke="var(--card-panel-border)" />

  <rect x="140" y="142" width="92" height="92" rx="22" fill="url(#brand)" />
  <text x="186" y="200" fill="var(--card-ink)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="700" text-anchor="middle">CR</text>

  <text x="140" y="298" fill="var(--card-ink)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="700">Awesome Cursor Rules Academy</text>
  <text x="140" y="362" fill="var(--card-muted)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28">Chinese-first technical whitepaper and architecture showcase</text>
  <text x="140" y="410" fill="var(--card-ink)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28">Research references, academy paths, and evidence-driven rules</text>

  <line x1="140" y1="452" x2="1060" y2="452" stroke="var(--card-panel-border)" />

  <text x="140" y="500" fill="var(--card-ink)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22">LessUp/awesome-cursorrules-zh</text>
  <text x="140" y="534" fill="var(--card-subtle)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">Rules, architecture, and governance aligned in one bilingual publication surface.</text>
</svg>
